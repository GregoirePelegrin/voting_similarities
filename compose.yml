services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///data/dev.db}
      - API_PORT=${API_PORT:-8000}
      - API_HOST=0.0.0.0
      - RELOAD=False
      - CORS_ORIGINS=${CORS_ORIGINS:-[\"*\"]}
      - DB_ECHO=${DB_ECHO:-False}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-5}
      - UVICORN_WORKERS=${UVICORN_WORKERS:-4}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SIMILARITY_W_YES=${SIMILARITY_W_YES:-1.0}
      - SIMILARITY_W_NO=${SIMILARITY_W_NO:-0.2}
      - SIMILARITY_W_MISMATCH=${SIMILARITY_W_MISMATCH:-0.5}
      - SIMILARITY_BAYESIAN_M=${SIMILARITY_BAYESIAN_M:-10}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
